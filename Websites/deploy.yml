name: Deploy theme to cPanel

# Cloud-native deploy: Claude Code (web) pushes to this repo over HTTPS;
# this Action does the SSH into cPanel that the web sandbox cannot.
# All connection details live in GitHub Actions Secrets (encrypted), never
# in the repo, the prompt, or chat.

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}   # lets you (or Claude) trigger a deploy manually

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          # Fail fast if the connection or auth is wrong
          ssh -i ~/.ssh/id_deploy -p "${{ secrets.SSH_PORT }}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" true
          echo "SSH connection OK"

      - name: Confirm WP-CLI + WordPress on the server
        run: |
          ssh -i ~/.ssh/id_deploy -p "${{ secrets.SSH_PORT }}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "wp --path='${{ secrets.WP_PATH }}' core version"

      - name: Deploy theme (rsync)
        # ./theme/ in the repo mirrors the active theme directory on the server.
        # --delete keeps the server theme an exact mirror of the repo theme.
        # Scope is the theme dir only, so uploads/core/other sites are untouched.
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_deploy -p ${{ secrets.SSH_PORT }}" \
            ./theme/ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.WP_THEME_PATH }}/"

      - name: Sync ACF JSON and report status (evidence)
        run: |
          ssh -i ~/.ssh/id_deploy -p "${{ secrets.SSH_PORT }}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "set -e; \
             cd '${{ secrets.WP_PATH }}'; \
             wp acf json status; \
             wp acf json sync --dry-run; \
             wp acf json sync; \
             wp acf json status"

      - name: Done
        run: echo "Deploy + ACF sync complete. Logs above are the verification evidence."
