name: Deploy theme to cPanel

# Deploys client sites that all live on ONE dev cPanel account, each
# WordPress install in its own folder under public_html/.
#
# - ONE GitHub secret, set once: DEPLOY_SSH_KEY (the private key; its
#   public half is authorized once in the dev cPanel under
#   SSH Access > Manage SSH Keys).
# - Connection details live in sites.json: "defaults" holds the shared
#   host/user/port, "sites" maps each Websites/<client>/ folder to its
#   WordPress install path. A site entry can override any default.
#
# Onboarding a new client site:
#   1. Install WordPress at public_html/<client> on the dev cPanel
#   2. Add the client's entry to sites.json
# No new keys, no GitHub settings.
#
# Server paths are relative to the cPanel user's home directory:
#   wp_path:    public_html/<client>
#   theme dir:  public_html/<client>/wp-content/themes/<theme_slug>

on:
  push:
    branches: [ main ]
    paths: [ 'Websites/**' ]
  workflow_dispatch:
    inputs:
      client:
        description: 'Site folder under Websites/ (e.g. dentelectrical)'
        required: true
        default: 'dentelectrical'
        type: string
      connection_test:
        description: 'Only test the SSH connection — deploy nothing'
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      clients: ${{ steps.set.outputs.clients }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Work out which client sites to deploy
        id: set
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            clients='["${{ inputs.client }}"]'
          else
            before="${{ github.event.before }}"
            if [ "$before" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$before" 2>/dev/null; then
              range="HEAD~1..HEAD"
            else
              range="$before..${{ github.sha }}"
            fi
            changed=$(git diff --name-only $range -- 'Websites/' | awk -F/ 'NF>2 {print $2}' | sort -u)
            if [ -z "$changed" ]; then
              clients='[]'
            else
              clients=$(printf '%s\n' $changed | jq -R . | jq -cs .)
            fi
          fi
          echo "Deploying clients: $clients"
          echo "clients=$clients" >> "$GITHUB_OUTPUT"

  deploy:
    needs: detect
    if: needs.detect.outputs.clients != '[]'
    runs-on: ubuntu-latest
    # The deploy secrets (DEPLOY_SSH_KEY, DEPLOY_SSH_KEY_PASSPHRASE) live in
    # this GitHub environment; the job must run in its context to read them.
    environment: Configure Logins
    strategy:
      fail-fast: false
      matrix:
        client: ${{ fromJson(needs.detect.outputs.clients) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load site config from sites.json
        id: cfg
        run: |
          c='${{ matrix.client }}'
          if ! jq -e --arg c "$c" '.sites | has($c)' sites.json >/dev/null; then
            echo "::error::'$c' has no entry under \"sites\" in sites.json — add one before deploying."
            exit 1
          fi
          if [ ! -d "Websites/$c" ]; then
            echo "::error::Folder Websites/$c does not exist in the repo."
            exit 1
          fi
          # Site entry inherits from "defaults"; any key set on the site wins.
          site=$(jq -c --arg c "$c" '.defaults + .sites[$c]' sites.json)
          host=$(jq -rn --argjson s "$site" '$s.host')
          if [ "$host" = "REPLACE_WITH_DEV_SERVER_HOSTNAME" ] || [ -z "$host" ] || [ "$host" = "null" ]; then
            echo "::error::sites.json still has a placeholder host — fill in the real dev server hostname under \"defaults\"."
            exit 1
          fi
          {
            echo "SSH_HOST=$host"
            echo "SSH_USER=$(jq -rn --argjson s "$site" '$s.user')"
            echo "SSH_PORT=$(jq -rn --argjson s "$site" '$s.port // 22')"
            echo "THEME_SLUG=$(jq -rn --argjson s "$site" --arg c "$c" '$s.theme_slug // $c')"
            echo "WP_PATH=$(jq -rn --argjson s "$site" --arg c "$c" '$s.wp_path // ("public_html/" + $c)')"
          } >> "$GITHUB_ENV"

      - name: Debug — list visible secret names (values stay masked)
        env:
          SECRET_KEYS: ${{ toJson(secrets) }}
        run: echo "$SECRET_KEYS" | jq 'keys'

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_KEY_PASSPHRASE: ${{ secrets.DEPLOY_SSH_KEY_PASSPHRASE }}
        run: |
          if [ -z "$SSH_KEY" ]; then
            echo "::error::Secret DEPLOY_SSH_KEY is missing — add the master private key once under Settings > Secrets and variables > Actions."
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          # cPanel-generated keys are passphrase-encrypted; decrypt for CI use
          if grep -q ENCRYPTED ~/.ssh/id_deploy; then
            if [ -z "$SSH_KEY_PASSPHRASE" ]; then
              echo "::error::The deploy key is passphrase-protected — add the passphrase as secret DEPLOY_SSH_KEY_PASSPHRASE."
              exit 1
            fi
            openssl rsa -in ~/.ssh/id_deploy -passin env:SSH_KEY_PASSPHRASE -out ~/.ssh/id_deploy_dec
            mv ~/.ssh/id_deploy_dec ~/.ssh/id_deploy
            chmod 600 ~/.ssh/id_deploy
          fi
          # Fail fast if the connection or auth is wrong; surface the SSH error
          if ! ssh -i ~/.ssh/id_deploy -p "$SSH_PORT" \
               -o ConnectTimeout=20 -o BatchMode=yes -o StrictHostKeyChecking=accept-new \
               "$SSH_USER@$SSH_HOST" true 2> /tmp/ssh_err; then
            echo "::error::SSH connection failed: $(tail -3 /tmp/ssh_err | tr '\n' ' ')"
            exit 1
          fi
          echo "SSH connection OK"

      - name: Confirm WP-CLI + WordPress on the server
        run: |
          ssh -i ~/.ssh/id_deploy -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "wp --path=\"$WP_PATH\" core version"

      - name: Connection test only — stopping here
        if: github.event_name == 'workflow_dispatch' && inputs.connection_test
        run: echo "Connection test passed for '${{ matrix.client }}'. Nothing was deployed."

      - name: Deploy theme (rsync)
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.connection_test) }}
        # --delete keeps the server theme an exact mirror of the repo theme.
        # Scope is the theme dir only, so uploads/core/other files are untouched.
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_deploy -p $SSH_PORT" \
            "Websites/${{ matrix.client }}/" \
            "$SSH_USER@$SSH_HOST:$WP_PATH/wp-content/themes/$THEME_SLUG/"

      - name: Sync ACF JSON and report status (evidence)
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.connection_test) }}
        run: |
          ssh -i ~/.ssh/id_deploy -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "set -e; \
             cd \"$WP_PATH\"; \
             if wp cli has-command 'acf json' 2>/dev/null; then \
               wp acf json status; wp acf json sync; wp acf json status; \
             else \
               echo 'ACF JSON CLI not available — skipping sync (fields will sync from acf-json/ on admin load).'; \
             fi"
