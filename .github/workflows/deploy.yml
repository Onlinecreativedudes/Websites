name: Deploy theme to cPanel

# Deploys client sites that all live on ONE dev cPanel account, each
# WordPress install in its own folder under public_html/.
#
# Transport is the cPanel API over HTTPS (port 2083) because the server's
# firewall blocks SSH from GitHub runners (verified by probe: 22 and 2683
# filtered, 443 and 2083 open).
#
# - ONE GitHub secret, set once: CPANEL_PASSWORD (the cPanel account
#   password for the user in sites.json).
# - Connection details live in sites.json: "defaults" holds the shared
#   cpanel_host/user, "sites" maps each Websites/<client>/ folder to its
#   WordPress install path and public URL. A site entry can override any
#   default.
#
# Onboarding a new client site:
#   1. Install WordPress at public_html/<client> on the dev cPanel
#   2. Add the client's entry to sites.json
# No new keys, no GitHub settings.
#
# ACF JSON sync happens inside the theme (inc/acf-sync.php) on admin
# load, since WP-CLI isn't reachable without SSH.

# NOTE: This host blocks inbound automation from GitHub's IPs (SSH filtered,
# cPanel API returns 403), so the automatic push deploy is disabled. Deployment
# now runs server-side via deploy.sh (cPanel cron / Git Version Control), which
# pulls from GitHub instead. This workflow is kept for manual runs only, in case
# the host's IP allowlist is opened up later.
on:
  workflow_dispatch:
    inputs:
      client:
        description: 'Site folder under Websites/ (e.g. solar-naturally)'
        required: true
        default: 'solar-naturally'
        type: string
      connection_test:
        description: 'Only test the cPanel API connection — deploy nothing'
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      clients: ${{ steps.set.outputs.clients }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Work out which client sites to deploy
        id: set
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            clients='["${{ inputs.client }}"]'
          else
            before="${{ github.event.before }}"
            if [ "$before" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$before" 2>/dev/null; then
              range="HEAD~1..HEAD"
            else
              range="$before..${{ github.sha }}"
            fi
            changed=$(git diff --name-only $range -- 'Websites/' | awk -F/ 'NF>2 {print $2}' | sort -u)
            if [ -z "$changed" ]; then
              clients='[]'
            else
              clients=$(printf '%s\n' $changed | jq -R . | jq -cs .)
            fi
          fi
          echo "Deploying clients: $clients"
          echo "clients=$clients" >> "$GITHUB_OUTPUT"

  deploy:
    needs: detect
    if: needs.detect.outputs.clients != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        client: ${{ fromJson(needs.detect.outputs.clients) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load site config from sites.json
        id: cfg
        run: |
          c='${{ matrix.client }}'
          if ! jq -e --arg c "$c" '.sites | has($c)' sites.json >/dev/null; then
            echo "::error::'$c' has no entry under \"sites\" in sites.json — add one before deploying."
            exit 1
          fi
          if [ ! -d "Websites/$c" ]; then
            echo "::error::Folder Websites/$c does not exist in the repo."
            exit 1
          fi
          # Site entry inherits from "defaults"; any key set on the site wins.
          site=$(jq -c --arg c "$c" '.defaults + .sites[$c]' sites.json)
          {
            echo "CP_HOST=$(jq -rn --argjson s "$site" '$s.cpanel_host')"
            echo "CP_USER=$(jq -rn --argjson s "$site" '$s.user')"
            echo "THEME_SLUG=$(jq -rn --argjson s "$site" --arg c "$c" '$s.theme_slug // $c')"
            echo "WP_PATH=$(jq -rn --argjson s "$site" --arg c "$c" '$s.wp_path // ("public_html/" + $c)')"
            echo "SITE_URL=$(jq -rn --argjson s "$site" '$s.url // empty')"
          } >> "$GITHUB_ENV"

      - name: Test cPanel API connection
        env:
          CPANEL_API_TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
          CPANEL_PASSWORD: ${{ secrets.CPANEL_PASSWORD }}
        run: |
          if [ -n "$CPANEL_API_TOKEN" ]; then
            echo "CP_AUTH_MODE=token" >> "$GITHUB_ENV"
          elif [ -n "$CPANEL_PASSWORD" ]; then
            echo "CP_AUTH_MODE=password" >> "$GITHUB_ENV"
          else
            echo "::error::Add either CPANEL_API_TOKEN (preferred; cPanel > Security > Manage API Tokens) or CPANEL_PASSWORD as a repository secret."
            exit 1
          fi
          # uapi: Fileman::list_files on the home dir proves auth + reachability
          if [ -n "$CPANEL_API_TOKEN" ]; then
            resp=$(curl -sS -m 30 -w '\nHTTP_CODE:%{http_code}' -H "Authorization: cpanel $CP_USER:$CPANEL_API_TOKEN" \
              "https://$CP_HOST:2083/execute/Fileman/list_files?dir=%2Fhome%2F$CP_USER" || true)
          else
            resp=$(curl -sS -m 30 -w '\nHTTP_CODE:%{http_code}' -u "$CP_USER:$CPANEL_PASSWORD" \
              "https://$CP_HOST:2083/execute/Fileman/list_files?dir=%2Fhome%2F$CP_USER" || true)
          fi
          code=$(echo "$resp" | grep -o 'HTTP_CODE:[0-9]*' | cut -d: -f2)
          body=$(echo "$resp" | sed 's/HTTP_CODE:[0-9]*$//')
          if ! echo "$body" | jq -e '.status == 1' >/dev/null 2>&1; then
            echo "::error::cPanel API auth/connection failed (HTTP $code, auth mode: $CP_AUTH_MODE). If using the password and it is correct, the host likely requires an API token: cPanel > Security > Manage API Tokens."
            exit 1
          fi
          echo "cPanel API connection OK (auth mode: $CP_AUTH_MODE)"

      - name: Confirm WordPress install exists at the target path
        env:
          CPANEL_API_TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
          CPANEL_PASSWORD: ${{ secrets.CPANEL_PASSWORD }}
        run: |
          if [ "$CP_AUTH_MODE" = "token" ]; then auth=(-H "Authorization: cpanel $CP_USER:$CPANEL_API_TOKEN"); else auth=(-u "$CP_USER:$CPANEL_PASSWORD"); fi
          enc_path=$(python3 -c "import urllib.parse;print(urllib.parse.quote('/home/$CP_USER/$WP_PATH'))")
          resp=$(curl -sS -m 30 "${auth[@]}" \
            "https://$CP_HOST:2083/execute/Fileman/list_files?dir=$enc_path")
          if ! echo "$resp" | jq -e '.data[]? | select(.file == "wp-config.php")' >/dev/null; then
            echo "::error::No wp-config.php found in $WP_PATH — is WordPress installed there?"
            echo "$resp" | jq -r '.data[]?.file' | head -20
            exit 1
          fi
          echo "WordPress install confirmed at $WP_PATH"

      - name: Connection test only — stopping here
        if: github.event_name == 'workflow_dispatch' && inputs.connection_test
        run: echo "Connection test passed for '${{ matrix.client }}'. Nothing was deployed."

      - name: Package theme
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.connection_test) }}
        run: |
          mkdir -p /tmp/pkg
          cp -r "Websites/${{ matrix.client }}" "/tmp/pkg/$THEME_SLUG"
          (cd /tmp/pkg && zip -qr theme.zip "$THEME_SLUG")
          ls -la /tmp/pkg/theme.zip

      - name: Upload and extract theme via cPanel API
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.connection_test) }}
        env:
          CPANEL_API_TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
          CPANEL_PASSWORD: ${{ secrets.CPANEL_PASSWORD }}
        run: |
          api() {
            if [ "$CP_AUTH_MODE" = "token" ]; then
              curl -sS -m 60 -H "Authorization: cpanel $CP_USER:$CPANEL_API_TOKEN" "$@"
            else
              curl -sS -m 60 -u "$CP_USER:$CPANEL_PASSWORD" "$@"
            fi
          }
          enc() { python3 -c "import urllib.parse,sys;print(urllib.parse.quote(sys.argv[1]))" "$1"; }

          home="/home/$CP_USER"
          themes_dir="$home/$WP_PATH/wp-content/themes"

          # 1. Upload the zip to the home directory
          up=$(api -X POST "https://$CP_HOST:2083/execute/Fileman/upload_files" \
            -F "dir=$home" -F "file-1=@/tmp/pkg/theme.zip")
          echo "$up" | jq -e '.status == 1' >/dev/null || { echo "::error::Upload failed: $(echo "$up" | head -c 300)"; exit 1; }
          echo "Uploaded theme.zip"

          # 2. Remove the existing theme dir so deletions in the repo propagate
          api "https://$CP_HOST:2083/json-api/cpanel?cpanel_jsonapi_apiversion=2&cpanel_jsonapi_module=Fileman&cpanel_jsonapi_func=fileop&op=unlink&sourcefiles=$(enc "$themes_dir/$THEME_SLUG")" >/dev/null || true

          # 3. Extract the zip into the themes directory
          ex=$(api "https://$CP_HOST:2083/json-api/cpanel?cpanel_jsonapi_apiversion=2&cpanel_jsonapi_module=Fileman&cpanel_jsonapi_func=fileop&op=extract&sourcefiles=$(enc "$home/theme.zip")&destfiles=$(enc "$themes_dir")")
          if echo "$ex" | jq -e '.cpanelresult.error' >/dev/null 2>&1; then
            echo "::error::Extract failed: $(echo "$ex" | head -c 400)"
            exit 1
          fi
          echo "Extracted theme into $themes_dir/$THEME_SLUG"

          # 4. Clean up the uploaded zip
          api "https://$CP_HOST:2083/json-api/cpanel?cpanel_jsonapi_apiversion=2&cpanel_jsonapi_module=Fileman&cpanel_jsonapi_func=fileop&op=unlink&sourcefiles=$(enc "$home/theme.zip")" >/dev/null || true

      - name: Verify deployed files and site response (evidence)
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.connection_test) }}
        env:
          CPANEL_API_TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
          CPANEL_PASSWORD: ${{ secrets.CPANEL_PASSWORD }}
        run: |
          if [ "$CP_AUTH_MODE" = "token" ]; then auth=(-H "Authorization: cpanel $CP_USER:$CPANEL_API_TOKEN"); else auth=(-u "$CP_USER:$CPANEL_PASSWORD"); fi
          enc_path=$(python3 -c "import urllib.parse;print(urllib.parse.quote('/home/$CP_USER/$WP_PATH/wp-content/themes/$THEME_SLUG'))")
          resp=$(curl -sS -m 30 "${auth[@]}" \
            "https://$CP_HOST:2083/execute/Fileman/list_files?dir=$enc_path")
          echo "Theme directory listing:"
          echo "$resp" | jq -r '.data[]?.file' | sort
          echo "$resp" | jq -e '.data[]? | select(.file == "style.css")' >/dev/null \
            || { echo "::error::style.css missing from deployed theme dir"; exit 1; }
          if [ -n "$SITE_URL" ]; then
            code=$(curl -s -o /dev/null -w "%{http_code}" -m 30 -L "$SITE_URL" || echo 000)
            echo "Site $SITE_URL responded with HTTP $code"
          fi
          echo "Deploy verified."
