name: Deploy theme to cPanel

# Multi-client deploy with a single master deploy key.
#
# - ONE GitHub secret, set once, never per client: DEPLOY_SSH_KEY
#   (the private key; its public half gets authorized in each client's
#   cPanel under SSH Access > Manage SSH Keys).
# - Everything else per client (host, user, port, paths) lives in
#   sites.json — not sensitive, editable in the repo.
#
# Onboarding a new client:
#   1. cPanel: SSH Access > Import Key > paste the master PUBLIC key > Authorize
#   2. Add the client's entry to sites.json
# That's it. No GitHub settings involved.
#
# Server paths are relative to the cPanel user's home directory, so the
# same convention works on every account:
#   wp_path:    public_html
#   theme dir:  public_html/wp-content/themes/<theme_slug>

on:
  push:
    branches: [ main ]
    paths: [ 'Websites/**' ]
  workflow_dispatch:
    inputs:
      client:
        description: 'Site folder under Websites/ (e.g. dentelectrical)'
        required: true
        default: 'dentelectrical'
        type: string
      connection_test:
        description: 'Only test the SSH connection — deploy nothing'
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      clients: ${{ steps.set.outputs.clients }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Work out which client sites to deploy
        id: set
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            clients='["${{ inputs.client }}"]'
          else
            before="${{ github.event.before }}"
            if [ "$before" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$before" 2>/dev/null; then
              range="HEAD~1..HEAD"
            else
              range="$before..${{ github.sha }}"
            fi
            changed=$(git diff --name-only $range -- 'Websites/' | awk -F/ 'NF>2 {print $2}' | sort -u)
            if [ -z "$changed" ]; then
              clients='[]'
            else
              clients=$(printf '%s\n' $changed | jq -R . | jq -cs .)
            fi
          fi
          echo "Deploying clients: $clients"
          echo "clients=$clients" >> "$GITHUB_OUTPUT"

  deploy:
    needs: detect
    if: needs.detect.outputs.clients != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        client: ${{ fromJson(needs.detect.outputs.clients) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load site config from sites.json
        id: cfg
        run: |
          c='${{ matrix.client }}'
          if ! jq -e --arg c "$c" 'has($c)' sites.json >/dev/null; then
            echo "::error::'$c' has no entry in sites.json — add one before deploying."
            exit 1
          fi
          if [ ! -d "Websites/$c" ]; then
            echo "::error::Folder Websites/$c does not exist in the repo."
            exit 1
          fi
          host=$(jq -r --arg c "$c" '.[$c].host' sites.json)
          if [ "$host" = "REPLACE_WITH_SERVER_HOSTNAME" ] || [ -z "$host" ] || [ "$host" = "null" ]; then
            echo "::error::sites.json entry for '$c' still has a placeholder host — fill in the real server hostname."
            exit 1
          fi
          {
            echo "SSH_HOST=$host"
            echo "SSH_USER=$(jq -r --arg c "$c" '.[$c].user' sites.json)"
            echo "SSH_PORT=$(jq -r --arg c "$c" '.[$c].port // 22' sites.json)"
            echo "THEME_SLUG=$(jq -r --arg c "$c" '.[$c].theme_slug' sites.json)"
            echo "WP_PATH=$(jq -r --arg c "$c" '.[$c].wp_path // "public_html"' sites.json)"
          } >> "$GITHUB_ENV"

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          if [ -z "$SSH_KEY" ]; then
            echo "::error::Secret DEPLOY_SSH_KEY is missing — add the master private key once under Settings > Secrets and variables > Actions."
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          # Fail fast if the connection or auth is wrong
          ssh -i ~/.ssh/id_deploy -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" true
          echo "SSH connection OK"

      - name: Confirm WP-CLI + WordPress on the server
        run: |
          ssh -i ~/.ssh/id_deploy -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "wp --path=\"$WP_PATH\" core version"

      - name: Connection test only — stopping here
        if: github.event_name == 'workflow_dispatch' && inputs.connection_test
        run: echo "Connection test passed for '${{ matrix.client }}'. Nothing was deployed."

      - name: Deploy theme (rsync)
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.connection_test) }}
        # --delete keeps the server theme an exact mirror of the repo theme.
        # Scope is the theme dir only, so uploads/core/other files are untouched.
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_deploy -p $SSH_PORT" \
            "Websites/${{ matrix.client }}/" \
            "$SSH_USER@$SSH_HOST:$WP_PATH/wp-content/themes/$THEME_SLUG/"

      - name: Sync ACF JSON and report status (evidence)
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.connection_test) }}
        run: |
          ssh -i ~/.ssh/id_deploy -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "set -e; \
             cd \"$WP_PATH\"; \
             if wp cli has-command 'acf json' 2>/dev/null; then \
               wp acf json status; wp acf json sync; wp acf json status; \
             else \
               echo 'ACF JSON CLI not available — skipping sync (fields will sync from acf-json/ on admin load).'; \
             fi"
